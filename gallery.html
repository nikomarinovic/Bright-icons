<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bright Icons — Gallery</title>
  <meta name="description" content="Browse and download the full Bright Icons SVG library." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js" defer></script>
  <style>
    /* ══════════════════════════════════════════════
       GALLERY PAGE
    ══════════════════════════════════════════════ */
    .gallery-page {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .gallery-page .nav {
      max-width: unset;
      width: 100%;
      box-sizing: border-box;
      position: relative;
      z-index: 5;
    }

    .gallery-ambient {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 280px;
      background: radial-gradient(ellipse, rgba(40,142,69,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ══════════════════════════════════════════════
       TOOLBAR
    ══════════════════════════════════════════════ */
    .gallery-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid rgba(48,54,61,0.6);
      background: rgba(13,17,23,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 20;
      flex-shrink: 0;
    }

    .gallery-search-wrap {
      position: relative;
      flex: 1;
      max-width: 380px;
    }
    .gallery-search-icon {
      position: absolute;
      left: 0.8rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-fg);
      pointer-events: none;
      display: flex;
    }
    .gallery-search {
      width: 100%;
      height: 32px;
      padding: 0 0.85rem 0 2.25rem;
      border-radius: 0.5rem;
      background: rgba(33,38,45,0.8);
      color: var(--fg);
      font-family: var(--font-display);
      font-size: 0.78rem;
      border: 1px solid rgba(48,54,61,0.8);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .gallery-search::placeholder { color: var(--muted-fg); }
    .gallery-search:focus {
      background: rgba(33,38,45,1);
      border-color: rgba(40,142,69,0.5);
      box-shadow: 0 0 0 3px rgba(40,142,69,0.1);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-left: auto;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 0.65rem;
      border-radius: 9999px;
      background: rgba(33,38,45,0.8);
      border: 1px solid rgba(48,54,61,0.8);
      font-family: var(--font-display);
      font-size: 0.67rem;
      color: var(--muted-fg);
      white-space: nowrap;
      gap: 0.2rem;
    }
    .count-pill strong { color: var(--fg); font-weight: 600; }

    .toolbar-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: rgba(33,38,45,0.8);
      border: 1px solid rgba(48,54,61,0.8);
      border-radius: 0.375rem;
      padding: 2px;
    }
    .view-btn {
      width: 26px; height: 26px;
      border-radius: 0.25rem;
      border: none;
      background: transparent;
      color: var(--muted-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .view-btn:hover { color: var(--fg); background: rgba(48,54,61,0.5); }
    .view-btn.active { background: var(--secondary); color: var(--fg); }

    /* ══════════════════════════════════════════════
       GRID
    ══════════════════════════════════════════════ */
    .gallery-main {
      flex: 1;
      padding: 1.75rem 2rem 6rem;
      position: relative;
      z-index: 2;
    }

    .gallery-section-label {
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .gallery-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(48,54,61,0.8), transparent);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 0.2rem;
    }
    .gallery-grid.view-large {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.25rem;
    }
    .gallery-grid.view-list {
      grid-template-columns: 1fr;
      gap: 0.2rem;
    }

    /* ── Tile ── */
    .gal-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border-radius: 0.75rem;
      cursor: pointer;
      padding: 0.875rem 0.5rem 0.65rem;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s,
                  transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      animation: fadeUp 0.4s ease-out both;
      position: relative;
      overflow: hidden;
    }
    .gal-tile::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 35%, rgba(40,142,69,0.07), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gal-tile:hover {
      background: var(--secondary);
      border-color: rgba(48,54,61,0.9);
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(40,142,69,0.08);
    }
    .gal-tile:hover::before { opacity: 1; }
    .gal-tile:active { transform: scale(0.97); }

    .tile-icon {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .tile-icon svg { width: 56px; height: 56px; display: block; }
    .gal-tile:hover .tile-icon { transform: scale(1.08); }

    .gal-tile-name {
      font-family: var(--font-display);
      font-size: 0.48rem;
      color: var(--muted-fg);
      text-align: center;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; max-width: 100%;
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .gal-tile:hover .gal-tile-name { color: var(--fg); }

    /* Green dot — icon has multiple variants */
    .gal-dark-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.7;
    }

    /* List view overrides */
    .gallery-grid.view-list .gal-tile {
      flex-direction: row;
      justify-content: flex-start;
      padding: 0.5rem 0.875rem;
      gap: 0.75rem;
      border-radius: 0.5rem;
    }
    .gallery-grid.view-list .tile-icon { width: 28px; height: 28px; }
    .gallery-grid.view-list .tile-icon svg { width: 28px; height: 28px; }
    .gallery-grid.view-list .gal-tile-name {
      font-size: 0.72rem; letter-spacing: 0.01em;
      text-align: left; overflow: visible;
    }
    .gallery-grid.view-list .gal-tile:hover { transform: translateX(3px) scale(1); }

    /* Large view overrides */
    .gallery-grid.view-large .tile-icon { width: 68px; height: 68px; }
    .gallery-grid.view-large .tile-icon svg { width: 68px; height: 68px; }
    .gallery-grid.view-large .gal-tile-name { font-size: 0.55rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .gallery-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 0;
      color: var(--muted-fg);
      font-family: var(--font-display);
      font-size: 0.78rem;
      line-height: 2;
    }
    .gallery-spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(48,54,61,0.8);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    .gallery-state code {
      background: var(--secondary);
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.72rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       MODAL — 3-column layout
    ══════════════════════════════════════════════ */
    .icon-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px) saturate(0.6);
      -webkit-backdrop-filter: blur(20px) saturate(0.6);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: overlayIn 0.18s ease;
    }
    .icon-modal-overlay.open { display: flex; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

    .icon-modal {
      background: #0f1419;
      border: 1px solid rgba(48,54,61,0.6);
      border-radius: 1.5rem;
      width: min(1000px, 100%);
      max-height: 88vh;
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 120px rgba(0,0,0,0.85),
        0 0 180px rgba(40,142,69,0.04);
      animation: modalIn 0.3s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.88) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── CLOSE BUTTON ── */
    .modal-close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 2rem; height: 2rem;
      border-radius: 0.5rem;
      background: rgba(33,38,45,0.9);
      border: 1px solid rgba(48,54,61,0.6);
      color: var(--muted-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      z-index: 20;
      backdrop-filter: blur(8px);
    }
    .modal-close-btn:hover {
      background: var(--muted); color: var(--fg);
      border-color: var(--muted-fg);
      transform: rotate(90deg) scale(1.05);
    }

    /* ══════════════════════
       LEFT — Variants List
    ══════════════════════ */
    .modal-variants-panel {
      border-right: 1px solid rgba(48,54,61,0.5);
      display: flex;
      flex-direction: column;
      background: #0d1117;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .modal-variants-panel::-webkit-scrollbar { width: 2px; }
    .modal-variants-panel::-webkit-scrollbar-thumb { background: var(--border); }

    .mvp-header {
      padding: 1.375rem 1.125rem 0.75rem;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    .mvp-icon-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mvp-subtitle {
      font-family: var(--font-display);
      font-size: 0.58rem;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .mvp-section-label {
      font-family: var(--font-display);
      font-size: 0.56rem;
      font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      padding: 1rem 1.125rem 0.5rem;
      flex-shrink: 0;
    }

    .variant-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0 0.625rem 1rem;
      flex-shrink: 0;
    }

    .variant-list-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 0.625rem;
      border-radius: 0.625rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .variant-list-item:hover {
      background: rgba(33,38,45,0.8);
    }
    .variant-list-item.active {
      background: rgba(40,142,69,0.07);
      border-color: rgba(40,142,69,0.3);
    }
    .variant-list-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 2px;
      border-radius: 1px;
      background: var(--primary);
    }

    .vli-thumb {
      width: 36px; height: 36px;
      border-radius: 0.5rem;
      background: rgba(33,38,45,0.6);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .vli-thumb.dark-bg { background: #f0f0f0; }
    .vli-thumb svg { width: 22px; height: 22px; display: block; }

    .vli-info {
      flex: 1;
      min-width: 0;
    }
    .vli-name {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--fg);
      text-transform: capitalize;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .variant-list-item.active .vli-name { color: #4ade80; }
    .vli-meta {
      font-family: var(--font-display);
      font-size: 0.55rem;
      color: var(--muted-fg);
      margin-top: 1px;
    }

    /* ══════════════════════
       CENTER — Preview
    ══════════════════════ */
    .modal-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      background: #0d1117;
      overflow: hidden;
      min-height: 380px;
    }
    .modal-center::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(40,142,69,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .modal-center::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(40,142,69,0.03) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Grid decoration */
    .modal-center-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(48,54,61,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48,54,61,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .modal-preview-wrap {
      position: relative;
      z-index: 2;
      width: 156px; height: 156px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-preview-ring {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      border: 1px solid rgba(40,142,69,0.10);
      animation: ringPulse 3s ease-in-out infinite;
    }
    .modal-preview-ring-2 {
      position: absolute;
      inset: -60px;
      border-radius: 50%;
      border: 1px solid rgba(40,142,69,0.04);
      animation: ringPulse 3s ease-in-out infinite 0.6s;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    .modal-preview-icon {
      width: 156px; height: 156px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      filter: drop-shadow(0 16px 40px rgba(0,0,0,0.5));
      transition: opacity 0.13s, transform 0.13s;
    }
    .modal-preview-icon svg { width: 156px; height: 156px; display: block; }
    .modal-preview-icon.swapping { opacity: 0; transform: scale(0.86); }

    /* Variant name chip */
    .preview-variant-chip {
      position: relative; z-index: 3;
      margin-top: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      height: 22px;
      padding: 0 0.65rem;
      border-radius: 9999px;
      background: rgba(33,38,45,0.7);
      border: 1px solid rgba(48,54,61,0.7);
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .preview-variant-chip::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.8;
    }

    /* ══════════════════════
       RIGHT — Export
    ══════════════════════ */
    .modal-export-panel {
      border-left: 1px solid rgba(48,54,61,0.5);
      display: flex;
      flex-direction: column;
      background: #0f1419;
      overflow-y: auto;
    }
    .modal-export-panel::-webkit-scrollbar { width: 2px; }
    .modal-export-panel::-webkit-scrollbar-thumb { background: var(--border); }

    .mep-section {
      padding: 1.25rem 1.25rem;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    .mep-section:last-child { border-bottom: none; }

    .mep-label {
      font-family: var(--font-display);
      font-size: 0.56rem;
      font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 0.75rem;
    }

    /* File format badges in export section */
    .format-badges {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 0.875rem;
      flex-wrap: wrap;
    }
    .fmt-badge {
      height: 20px;
      padding: 0 0.5rem;
      border-radius: 0.25rem;
      font-family: var(--font-display);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: rgba(33,38,45,0.8);
      border: 1px solid rgba(48,54,61,0.7);
      color: var(--muted-fg);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center;
    }
    .fmt-badge.active {
      background: rgba(40,142,69,0.12);
      border-color: rgba(40,142,69,0.3);
      color: #4ade80;
    }

    .export-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .exp-btn {
      width: 100%;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.875rem;
      border-radius: 0.5rem;
      font-family: var(--font-display);
      font-size: 0.72rem; font-weight: 500;
      border: 1px solid rgba(48,54,61,0.7);
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(33,38,45,0.5);
      color: var(--fg);
      text-align: left;
    }
    .exp-btn:hover {
      background: rgba(33,38,45,0.9);
      border-color: rgba(110,118,129,0.4);
      transform: translateX(2px);
    }
    .exp-btn:active { transform: scale(0.98); }
    .exp-btn.primary {
      background: linear-gradient(135deg, rgba(40,142,69,0.9), rgba(46,165,102,0.9));
      border-color: rgba(40,142,69,0.35);
      box-shadow: 0 4px 20px rgba(40,142,69,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .exp-btn.primary:hover {
      box-shadow: 0 6px 24px rgba(40,142,69,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: translateX(2px);
    }
    .exp-btn.success {
      background: linear-gradient(135deg, rgba(40,142,69,0.9), rgba(46,165,102,0.9));
      border-color: rgba(40,142,69,0.35);
      color: #fff;
    }
    .exp-btn svg { flex-shrink: 0; opacity: 0.9; }
    .exp-tag {
      margin-left: auto;
      font-size: 0.53rem; font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.1rem 0.4rem;
      border-radius: 0.2rem;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.4);
    }
    .exp-btn.primary .exp-tag { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.6); }

    /* Info section at bottom of export panel */
    .mep-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0;
    }
    .mep-info-key {
      font-family: var(--font-display);
      font-size: 0.6rem;
      color: var(--muted-fg);
    }
    .mep-info-val {
      font-family: var(--font-display);
      font-size: 0.6rem;
      color: var(--fg);
      font-weight: 600;
    }

    /* ══════════════════════
       TOAST
    ══════════════════════ */
    #gal-toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #1c2128;
      border: 1px solid rgba(48,54,61,0.9);
      border-radius: 0.625rem;
      padding: 0.6rem 1.25rem;
      font-family: var(--font-display);
      font-size: 0.73rem; color: var(--fg);
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999;
      display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #gal-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

<script src="js/icon-registry.js"></script>
<script>
  /* ══════════════════════════════════════════════
     GALLERY — multi-variant support
     JSON format: { name, variants: { variantName: { lightCode, darkCode } } }
     Legacy format: { name, lightCode, darkCode, hasDark }  → normalised
     Flat variant list: every light/dark file = its own clickable item.
  ══════════════════════════════════════════════ */

  const galGrid          = document.getElementById('galGrid');
  const galSearch        = document.getElementById('galSearch');
  const galCount         = document.getElementById('galCount');
  const galLabel         = document.getElementById('galLabel');
  const toast            = document.getElementById('gal-toast');
  const toastMsg         = document.getElementById('gal-toast-msg');
  const modal            = document.getElementById('iconModal');
  const modalClose       = document.getElementById('modalClose');
  const mvpIconName      = document.getElementById('mvpIconName');
  const mvpSubtitle      = document.getElementById('mvpSubtitle');
  const variantList      = document.getElementById('variantList');
  const modalPreviewIcon = document.getElementById('modalPreviewIcon');
  const previewVariantChip = document.getElementById('previewVariantChip');
  const infoVariants     = document.getElementById('infoVariants');
  const infoCurrent      = document.getElementById('infoCurrent');
  const expSVG           = document.getElementById('expSVG');
  const expPNG           = document.getElementById('expPNG');
  const expJPG           = document.getElementById('expJPG');
  const expCopySVG       = document.getElementById('expCopySVG');

  let allIcons     = [];
  let activeIcon   = null;
  let activeFlatKey = '';  // e.g. "default", "default_dark", "label", "label_dark"
  let toastTimer;

  /* ── Normalise legacy → new format ── */
  function normaliseIcon(raw) {
    if (raw.variants) return raw;
    return {
      name: raw.name,
      variants: {
        default: { lightCode: raw.lightCode, darkCode: raw.darkCode || null }
      }
    };
  }

  /**
   * Build a flat list of all selectable variant-mode combos.
   * Each entry: { key, label, isDark, code, thumbCode }
   *   key   = unique string like "default", "default_dark", "label", "label_dark"
   *   label = human-readable e.g. "Default", "Default · Dark", "Label", "Label · Dark"
   */
  function flatVariants(icon) {
    const items = [];
    for (const [vName, vData] of Object.entries(icon.variants)) {
      // Use the label from JSON if present, otherwise fall back to capitalize
      const baseName = vData.label || (vName === 'default' ? 'Default' : capitalize(vName));

      if (vData.lightCode) {
        items.push({
          key:       vName,
          label:     baseName,
          isDark:    false,
          code:      vData.lightCode,
          thumbCode: vData.lightCode,
        });
      }

      if (vData.darkCode) {
        // For the dark entry, replace the first segment with just the last word · Dark
        // e.g. "Bmw · Monocolor" → "Monocolor · Dark"
        //      "Default"         → "Default · Dark"
        const lastWord = baseName.includes(' · ')
          ? baseName.split(' · ').pop()
          : baseName;
        items.push({
          key:       vName + '_dark',
          label:     lastWord + ' · Dark',
          isDark:    true,
          code:      vData.darkCode,
          thumbCode: vData.darkCode,
        });
      }
    }

    // Sort: default first, then default_dark, then each variant + its dark, alphabetically
    items.sort((a, b) => {
      const rank = key => {
        if (key === 'default')      return 0;
        if (key === 'default_dark') return 1;
        const isDark = key.endsWith('_dark');
        const base   = isDark ? key.slice(0, -5) : key;
        return base + (isDark ? '\x01' : '\x00');
      };
      const ra = rank(a.key), rb = rank(b.key);
      if (typeof ra === 'number' && typeof rb === 'number') return ra - rb;
      if (typeof ra === 'number') return -1;
      if (typeof rb === 'number') return 1;
      return ra < rb ? -1 : ra > rb ? 1 : 0;
    });

    return items;
  }

  function capitalize(s) {
    return s.split('_').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' · ');
  }

  /* ── Helpers ── */
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  function activeItemData() {
    return flatVariants(activeIcon).find(v => v.key === activeFlatKey)
        || flatVariants(activeIcon)[0];
  }

  function activeCode() { return activeItemData().code; }

  function parseSVG(code) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(code, 'image/svg+xml');
    const svg = doc.documentElement;
    if (!svg.getAttribute('viewBox')) {
      const w = svg.getAttribute('width') || '24';
      const h = svg.getAttribute('height') || '24';
      svg.setAttribute('viewBox', `0 0 ${parseFloat(w)} ${parseFloat(h)}`);
    }
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    return svg;
  }

  function injectSVG(container, code) {
    container.innerHTML = '';
    if (code) container.appendChild(parseSVG(code));
  }

  function swapPreview(instant) {
    const item = activeItemData();
    if (instant) { injectSVG(modalPreviewIcon, item.code); return; }
    modalPreviewIcon.classList.add('swapping');
    setTimeout(() => {
      injectSVG(modalPreviewIcon, item.code);
      modalPreviewIcon.classList.remove('swapping');
    }, 130);
  }

  /* ── Build variant list (left panel) ── */
  function buildVariantList() {
    variantList.innerHTML = '';
    const items = flatVariants(activeIcon);

    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'variant-list-item' + (item.key === activeFlatKey ? ' active' : '');
      el.dataset.key = item.key;

      const thumb = document.createElement('div');
      thumb.className = 'vli-thumb' + (item.isDark ? ' dark-bg' : '');
      thumb.appendChild(parseSVG(item.thumbCode));

      const info = document.createElement('div');
      info.className = 'vli-info';

      const name = document.createElement('div');
      name.className = 'vli-name';
      name.textContent = item.label;

      info.appendChild(name);
      el.appendChild(thumb);
      el.appendChild(info);

      el.addEventListener('click', () => selectItem(item.key));
      variantList.appendChild(el);
    });
  }

  function selectItem(key) {
    activeFlatKey = key;

    // Update list highlight
    variantList.querySelectorAll('.variant-list-item').forEach(el => {
      el.classList.toggle('active', el.dataset.key === key);
    });

    const item = activeItemData();
    previewVariantChip.textContent = item.label;
    infoCurrent.textContent = item.label;

    swapPreview();
    resetExportBtns();
  }

  /* ── Open / close modal ── */
  function openModal(icon) {
    activeIcon = icon;
    const items = flatVariants(icon);
    activeFlatKey = items[0]?.key || 'default';

    mvpIconName.textContent = icon.name;
    const total = items.length;
    mvpSubtitle.textContent = `${total} variant${total !== 1 ? 's' : ''}`;
    infoVariants.textContent = total;

    buildVariantList();

    const first = items[0];
    previewVariantChip.textContent = first?.label || 'Default';
    infoCurrent.textContent = first?.label || 'Default';
    injectSVG(modalPreviewIcon, first?.code || '');

    resetExportBtns();
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  modalClose.addEventListener('click', closeModal);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !modal.classList.contains('open') && document.activeElement !== galSearch) {
      e.preventDefault();
      galSearch.focus();
    }
  });

  /* ── Export buttons ── */
  const DL_ICON = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/></svg>`;
  const CP_ICON = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M5 2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V5.5L10.5 2H5ZM4 1h6.5L14 4.5V12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3a2 2 0 0 1 1-1.732V1ZM1 4a1 1 0 0 1 1-1h1v1H2v9h6v-1h1v1a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4Z" fill="currentColor"/></svg>`;
  const OK_ICON = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M11.467 3.727c.289.286.29.751.002 1.04L6.12 10.149a.75.75 0 0 1-1.076-.026L3.03 7.888a.75.75 0 1 1 1.093-1.028l1.49 1.588 4.85-4.723a.75.75 0 0 1 1.004.002Z" fill="currentColor"/></svg>`;

  function resetExportBtns() {
    expSVG.innerHTML     = `${DL_ICON} Download SVG <span class="exp-tag">SVG</span>`;
    expPNG.innerHTML     = `${DL_ICON} Download PNG <span class="exp-tag">512px</span>`;
    expJPG.innerHTML     = `${DL_ICON} Download JPG <span class="exp-tag">512px</span>`;
    expCopySVG.innerHTML = `${CP_ICON} Copy SVG Code <span class="exp-tag">CODE</span>`;
    expCopySVG.classList.remove('success');
  }

  function filename(ext) {
    // e.g. mclaren_label_dark.svg
    const key = activeFlatKey === 'default' ? '' : `_${activeFlatKey}`;
    return `${activeIcon.name}${key}.${ext}`;
  }

  expSVG.addEventListener('click', async () => {
    try { await downloadAs(activeCode(), filename('svg'), 'svg'); showToast(`${filename('svg')} downloaded`); }
    catch { showToast('Download failed'); }
  });
  expPNG.addEventListener('click', async () => {
    expPNG.textContent = 'Generating…';
    try { await downloadAs(activeCode(), filename('png'), 'png'); showToast(`${filename('png')} downloaded`); }
    catch { showToast('PNG export failed'); }
    expPNG.innerHTML = `${DL_ICON} Download PNG <span class="exp-tag">512px</span>`;
  });
  expJPG.addEventListener('click', async () => {
    expJPG.textContent = 'Generating…';
    try { await downloadAs(activeCode(), filename('jpg'), 'jpg'); showToast(`${filename('jpg')} downloaded`); }
    catch { showToast('JPG export failed'); }
    expJPG.innerHTML = `${DL_ICON} Download JPG <span class="exp-tag">512px</span>`;
  });
  expCopySVG.addEventListener('click', async () => {
    try {
      await copyIconSVG(activeCode());
      expCopySVG.classList.add('success');
      expCopySVG.innerHTML = `${OK_ICON} Copied to clipboard <span class="exp-tag">✓</span>`;
      showToast('SVG code copied to clipboard');
      setTimeout(resetExportBtns, 2500);
    } catch { showToast('Copy failed — try again'); }
  });

  /* ── View toggle ── */
  function setView(v) {
    galGrid.className = 'gallery-grid' + (v === 'large' ? ' view-large' : v === 'list' ? ' view-list' : '');
    document.getElementById('viewCompact').classList.toggle('active', v === 'compact');
    document.getElementById('viewLarge').classList.toggle('active',   v === 'large');
    document.getElementById('viewList').classList.toggle('active',    v === 'list');
  }

  /* ── Grid rendering ── */
  function filtered() {
    const q = galSearch.value.trim().toLowerCase();
    return q ? allIcons.filter(i => i.name.toLowerCase().includes(q)) : allIcons;
  }

  function renderGrid(icons) {
    const q = galSearch.value.trim();
    galLabel.textContent = q ? `Search: "${q}"` : 'All Icons';

    if (!icons.length) {
      galGrid.innerHTML = `<div class="gallery-state">No results for "<em>${q}</em>"</div>`;
      galCount.innerHTML = `<strong>0</strong>&nbsp;icons`;
      return;
    }

    galCount.innerHTML = `<strong>${icons.length}</strong>&nbsp;icon${icons.length !== 1 ? 's' : ''}`;
    galGrid.innerHTML  = '';

    icons.forEach((icon, i) => {
      const defaultVariant = icon.variants['default'] || Object.values(icon.variants)[0];
      const totalFlat = flatVariants(icon).length;
      const hasMultiple = totalFlat > 1;

      const tile = document.createElement('div');
      tile.className = 'gal-tile';
      tile.style.animationDelay = `${Math.min(i * 6, 300)}ms`;
      tile.dataset.name = icon.name;

      // Green dot if icon has more than one selectable style
      if (hasMultiple) {
        const dot = document.createElement('span');
        dot.className = 'gal-dark-dot';
        dot.title = `${totalFlat} variants available`;
        tile.appendChild(dot);
      }

      const iconWrap = document.createElement('div');
      iconWrap.className = 'tile-icon';
      if (defaultVariant?.lightCode) {
        iconWrap.appendChild(parseSVG(defaultVariant.lightCode));
      }
      tile.appendChild(iconWrap);

      const label = document.createElement('span');
      label.className = 'gal-tile-name';
      label.textContent = icon.name;
      tile.appendChild(label);

      galGrid.appendChild(tile);
    });
  }

  galGrid.addEventListener('click', e => {
    const tile = e.target.closest('.gal-tile');
    if (!tile) return;
    const icon = allIcons.find(i => i.name === tile.dataset.name);
    if (icon) openModal(icon);
  });

  galSearch.addEventListener('input', () => renderGrid(filtered()));

  /* ── Init ── */
  (async () => {
    try {
      const raw = await loadIcons();
      allIcons  = raw.map(normaliseIcon);
      renderGrid(allIcons);
    } catch (err) {
      galGrid.innerHTML = `<div class="gallery-state">
        Could not load icons.<br>
        Run <code>cd public/dev && python generate_icons.py</code> to generate <code>data/icons.json</code>.<br><br>
        <small style="opacity:0.5">${err.message}</small>
      </div>`;
      console.error(err);
    }
  })();
</script>
</body>
</html>
