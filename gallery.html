<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bright Icons — Gallery</title>
  <meta name="description" content="Browse and download the full Bright Icons SVG library." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js" defer></script>
  <style>
    /* ══════════════════════════════════════════════
       GALLERY — FULL REDESIGN
       Aesthetic: Refined dark editorial.
    ══════════════════════════════════════════════ */

    .gallery-page {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .gallery-page .nav {
      max-width: unset;
      width: 100%;
      box-sizing: border-box;
      position: relative;
      z-index: 5;
    }

    /* Subtle ambient glow at top */
    .gallery-ambient {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 280px;
      background: radial-gradient(ellipse, rgba(40,142,69,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ══════════════════════════════════════════════
       TOOLBAR
    ══════════════════════════════════════════════ */
    .gallery-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid rgba(48,54,61,0.6);
      background: rgba(13,17,23,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 20;
      flex-shrink: 0;
    }

    .gallery-search-wrap {
      position: relative;
      flex: 1;
      max-width: 380px;
    }
    .gallery-search-icon {
      position: absolute;
      left: 0.8rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-fg);
      pointer-events: none;
      display: flex;
    }
    .gallery-search {
      width: 100%;
      height: 32px;
      padding: 0 0.85rem 0 2.25rem;
      border-radius: 0.5rem;
      background: rgba(33,38,45,0.8);
      color: var(--fg);
      font-family: var(--font-display);
      font-size: 0.78rem;
      border: 1px solid rgba(48,54,61,0.8);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .gallery-search::placeholder { color: var(--muted-fg); }
    .gallery-search:focus {
      background: rgba(33,38,45,1);
      border-color: rgba(40,142,69,0.5);
      box-shadow: 0 0 0 3px rgba(40,142,69,0.1);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-left: auto;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 0.65rem;
      border-radius: 9999px;
      background: rgba(33,38,45,0.8);
      border: 1px solid rgba(48,54,61,0.8);
      font-family: var(--font-display);
      font-size: 0.67rem;
      color: var(--muted-fg);
      white-space: nowrap;
      gap: 0.2rem;
    }
    .count-pill strong { color: var(--fg); font-weight: 600; }

    .toolbar-divider {
      width: 1px; height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: rgba(33,38,45,0.8);
      border: 1px solid rgba(48,54,61,0.8);
      border-radius: 0.375rem;
      padding: 2px;
    }
    .view-btn {
      width: 26px; height: 26px;
      border-radius: 0.25rem;
      border: none;
      background: transparent;
      color: var(--muted-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .view-btn:hover { color: var(--fg); background: rgba(48,54,61,0.5); }
    .view-btn.active { background: var(--secondary); color: var(--fg); }

    /* ══════════════════════════════════════════════
       GRID
    ══════════════════════════════════════════════ */
    .gallery-main {
      flex: 1;
      padding: 1.75rem 2rem 6rem;
      position: relative;
      z-index: 2;
    }

    .gallery-section-label {
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .gallery-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(48,54,61,0.8), transparent);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 0.2rem;
    }
    .gallery-grid.view-large {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.25rem;
    }
    .gallery-grid.view-list {
      grid-template-columns: 1fr;
      gap: 0.2rem;
    }

    /* ── Tile ── */
    .gal-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border-radius: 0.75rem;
      cursor: pointer;
      padding: 0.875rem 0.5rem 0.65rem;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s,
                  transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      animation: fadeUp 0.4s ease-out both;
      position: relative;
      overflow: hidden;
    }
    .gal-tile::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 35%, rgba(40,142,69,0.07), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gal-tile:hover {
      background: var(--secondary);
      border-color: rgba(48,54,61,0.9);
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(40,142,69,0.08);
    }
    .gal-tile:hover::before { opacity: 1; }
    .gal-tile:active { transform: scale(0.97); }

    /* Inline SVG icon in tile */
    .tile-icon {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .tile-icon svg {
      width: 56px; height: 56px;
      display: block;
    }
    .gal-tile:hover .tile-icon { transform: scale(1.08); }

    .gal-tile-name {
      font-family: var(--font-display);
      font-size: 0.48rem;
      color: var(--muted-fg);
      text-align: center;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; max-width: 100%;
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .gal-tile:hover .gal-tile-name { color: var(--fg); }

    /* Small green dot = has dark variant */
    .gal-dark-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.55;
    }

    /* List view overrides */
    .gallery-grid.view-list .gal-tile {
      flex-direction: row;
      justify-content: flex-start;
      padding: 0.5rem 0.875rem;
      gap: 0.75rem;
      border-radius: 0.5rem;
    }
    .gallery-grid.view-list .tile-icon { width: 28px; height: 28px; }
    .gallery-grid.view-list .tile-icon svg { width: 28px; height: 28px; }
    .gallery-grid.view-list .gal-tile-name {
      font-size: 0.72rem; letter-spacing: 0.01em;
      text-align: left; overflow: visible;
    }
    .gallery-grid.view-list .gal-tile:hover { transform: translateX(3px) scale(1); }

    /* Large view overrides */
    .gallery-grid.view-large .tile-icon { width: 68px; height: 68px; }
    .gallery-grid.view-large .tile-icon svg { width: 68px; height: 68px; }
    .gallery-grid.view-large .gal-tile-name { font-size: 0.55rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* States */
    .gallery-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 0;
      color: var(--muted-fg);
      font-family: var(--font-display);
      font-size: 0.78rem;
      line-height: 2;
    }
    .gallery-spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(48,54,61,0.8);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    .gallery-state code {
      background: var(--secondary);
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.72rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════════ */
    .icon-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px) saturate(0.7);
      -webkit-backdrop-filter: blur(18px) saturate(0.7);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: overlayIn 0.18s ease;
    }
    .icon-modal-overlay.open { display: flex; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

    .icon-modal {
      background: #13181f;
      border: 1px solid rgba(48,54,61,0.7);
      border-radius: 1.375rem;
      width: min(800px, 100%);
      max-height: 86vh;
      display: grid;
      grid-template-columns: 1fr 300px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 100px rgba(0,0,0,0.8),
        0 0 160px rgba(40,142,69,0.05);
      animation: modalIn 0.28s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* LEFT */
    .modal-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
      min-height: 400px;
      position: relative;
      background: #0d1117;
      overflow: hidden;
    }
    .modal-left::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(40,142,69,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .modal-left::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(40,142,69,0.04) 0%, transparent 65%);
      pointer-events: none;
    }

    .modal-preview-wrap {
      position: relative;
      z-index: 2;
      width: 128px; height: 128px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-preview-ring {
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(40,142,69,0.09);
      animation: ringPulse 3s ease-in-out infinite;
    }
    .modal-preview-ring-2 {
      position: absolute;
      inset: -52px;
      border-radius: 50%;
      border: 1px solid rgba(40,142,69,0.04);
      animation: ringPulse 3s ease-in-out infinite 0.6s;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    /* Inline SVG preview in modal */
    .modal-preview-icon {
      width: 128px; height: 128px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,0.5));
      transition: opacity 0.14s, transform 0.14s;
    }
    .modal-preview-icon svg {
      width: 128px; height: 128px;
      display: block;
    }
    .modal-preview-icon.swapping { opacity: 0; transform: scale(0.88); }

    /* RIGHT */
    .modal-right {
      border-left: 1px solid rgba(48,54,61,0.6);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: #0f1419;
    }
    .modal-right::-webkit-scrollbar { width: 3px; }
    .modal-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .modal-close-btn {
      position: absolute;
      top: 0.875rem; right: 0.875rem;
      width: 2rem; height: 2rem;
      border-radius: 0.5rem;
      background: rgba(33,38,45,0.9);
      border: 1px solid rgba(48,54,61,0.6);
      color: var(--muted-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      z-index: 20;
      backdrop-filter: blur(8px);
    }
    .modal-close-btn:hover {
      background: var(--muted); color: var(--fg);
      border-color: var(--muted-fg);
      transform: rotate(90deg) scale(1.05);
    }

    .modal-header {
      padding: 1.5rem 1.5rem 1.125rem;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      flex-shrink: 0;
    }
    .modal-icon-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .modal-badges { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .mbadge {
      display: inline-flex; align-items: center; gap: 0.28rem;
      height: 20px; padding: 0 0.55rem;
      border-radius: 9999px;
      font-family: var(--font-display);
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .mbadge.green {
      background: rgba(40,142,69,0.12); color: #4ade80;
      border: 1px solid rgba(40,142,69,0.2);
    }
    .mbadge.grey {
      background: rgba(110,118,129,0.1); color: var(--muted-fg);
      border: 1px solid var(--border);
    }

    .modal-section {
      padding: 1.125rem 1.5rem;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      flex-shrink: 0;
    }
    .modal-section-title {
      font-family: var(--font-display);
      font-size: 0.58rem; font-weight: 600;
      color: var(--muted-fg);
      text-transform: uppercase; letter-spacing: 0.16em;
      margin-bottom: 0.75rem;
    }

    /* Variant cards */
    .variant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .variant-card {
      border-radius: 0.75rem;
      border: 1.5px solid rgba(48,54,61,0.7);
      background: rgba(33,38,45,0.5);
      display: flex; flex-direction: column;
      align-items: center; gap: 0.45rem;
      padding: 0.875rem 0.5rem 0.625rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .variant-card:hover {
      border-color: rgba(110,118,129,0.5);
      background: rgba(33,38,45,0.9);
      transform: translateY(-1px);
    }
    .variant-card.active {
      border-color: rgba(40,142,69,0.5);
      background: rgba(40,142,69,0.06);
      box-shadow: 0 0 0 1px rgba(40,142,69,0.1);
    }
    .variant-card-bg {
      width: 48px; height: 48px;
      border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .variant-card-bg.dark-bg  { background: #0d1117; }
    .variant-card-bg.light-bg { background: #f0f0f0; }
    /* Inline SVG in variant cards */
    .variant-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .variant-icon svg { width: 32px; height: 32px; display: block; }
    .variant-card-label {
      font-family: var(--font-display);
      font-size: 0.56rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted-fg);
    }
    .variant-card.active .variant-card-label { color: #4ade80; }

    /* Export buttons */
    .export-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .exp-btn {
      width: 100%;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.875rem;
      border-radius: 0.5rem;
      font-family: var(--font-display);
      font-size: 0.73rem; font-weight: 500;
      border: 1px solid rgba(48,54,61,0.7);
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(33,38,45,0.5);
      color: var(--fg);
      text-align: left;
    }
    .exp-btn:hover {
      background: rgba(33,38,45,0.9);
      border-color: rgba(110,118,129,0.4);
      transform: translateX(2px);
    }
    .exp-btn:active { transform: scale(0.98); }
    .exp-btn.primary {
      background: linear-gradient(135deg, rgba(40,142,69,0.88), rgba(46,165,102,0.88));
      border-color: rgba(40,142,69,0.3);
      box-shadow: 0 4px 20px rgba(40,142,69,0.18), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .exp-btn.primary:hover {
      box-shadow: 0 6px 24px rgba(40,142,69,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: translateX(2px);
    }
    .exp-btn.success {
      background: linear-gradient(135deg, rgba(40,142,69,0.88), rgba(46,165,102,0.88));
      border-color: rgba(40,142,69,0.3);
      color: #fff;
    }
    .exp-btn svg { flex-shrink: 0; opacity: 0.9; }
    .exp-tag {
      margin-left: auto;
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.1rem 0.4rem;
      border-radius: 0.2rem;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.45);
    }
    .exp-btn.primary .exp-tag { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.6); }

    /* Toast */
    #gal-toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #1c2128;
      border: 1px solid rgba(48,54,61,0.9);
      border-radius: 0.625rem;
      padding: 0.6rem 1.25rem;
      font-family: var(--font-display);
      font-size: 0.73rem; color: var(--fg);
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999;
      display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #gal-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { color: #4ade80; display: flex; }

    /* Responsive */
    @media (max-width: 680px) {
      .icon-modal { grid-template-columns: 1fr; max-height: 92vh; }
      .modal-left { padding: 2.5rem 2rem; min-height: 220px; }
      .modal-preview-wrap { width: 88px; height: 88px; }
      .modal-preview-icon { width: 88px; height: 88px; }
      .modal-preview-icon svg { width: 88px; height: 88px; }
      .modal-preview-ring, .modal-preview-ring-2 { display: none; }
      .modal-right { border-left: none; border-top: 1px solid rgba(48,54,61,0.5); }
      .gallery-toolbar { padding: 0 1rem; }
      .gallery-main { padding: 1.25rem 1rem 5rem; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
      .view-toggle, .toolbar-divider { display: none; }
    }
    @media (max-width: 480px) {
      .icon-modal-overlay { padding: 0; align-items: flex-end; }
      .icon-modal {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        max-height: 95vh; width: 100%;
      }
    }
    .footer {
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="gallery-page">
    <div class="gallery-ambient"></div>

    <!-- Nav -->
    <nav class="nav">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="none">
          <rect width="32" height="32" rx="8" fill="#288e45"/>
          <rect x="5"  y="5"  width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="13" y="5"  width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="21" y="5"  width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="5"  y="13" width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="13" y="13" width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="21" y="13" width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="5"  y="21" width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="13" y="21" width="6" height="6" rx="1.5" fill="#fff"/>
          <rect x="21" y="21" width="6" height="6" rx="1.5" fill="#fff"/>
        </svg>
        Bright Icons
      </a>
      <div class="nav-links">
        <a href="editor.html" class="nav-btn">Open Editor</a>
      </div>
    </nav>

    <!-- Toolbar -->
    <div class="gallery-toolbar">
      <div class="gallery-search-wrap">
        <span class="gallery-search-icon">
          <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
            <path d="M10 6.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Zm-.691 3.516 2.838 2.837-.707.708-2.838-2.838A4.5 4.5 0 1 1 9.31 10.016Z" fill="currentColor"/>
          </svg>
        </span>
        <input class="gallery-search" id="galSearch" type="text" placeholder="Search icons…" autocomplete="off" spellcheck="false"/>
      </div>

      <div class="toolbar-right">

        <div class="toolbar-divider"></div>
        <div class="view-toggle">
          <button class="view-btn" id="viewCompact" title="Compact" onclick="setView('compact')">
            <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
              <path d="M1 1h3v3H1V1Zm5 0h3v3H6V1Zm5 0h3v3h-3V1ZM1 6h3v3H1V6Zm5 0h3v3H6V6Zm5 0h3v3h-3V6ZM1 11h3v3H1v-3Zm5 0h3v3H6v-3Zm5 0h3v3h-3v-3Z" fill="currentColor"/>

            <svg width="13" height="13" viewBox="0 0 15 15" fill="none">

            </svg>
          </button>
          <button class="view-btn" id="viewList" title="List" onclick="setView('list')">

    <div class="gallery-main">
      <div class="gallery-section-label" id="galLabel">All Icons</div>

        <div class="gallery-state">
          <div class="gallery-spinner"></div>
          Loading icons…
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 Niko Marinović. All rights reserved.</p>
      <br>
      <a href="https://github.com/nikomarinovic" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">

  <!-- MODAL -->
  <div class="icon-modal-overlay" id="iconModal" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="icon-modal">

      <button class="modal-close-btn" id="modalClose" aria-label="Close">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Left: Preview -->
      <div class="modal-left" id="modalLeft">
        <div class="modal-preview-wrap">
          <div class="modal-preview-ring"></div>
          <div class="modal-preview-ring-2"></div>
          <div class="modal-preview-icon" id="modalPreviewIcon"></div>
        </div>
      </div>

      <!-- Right -->
      <div class="modal-right">

        <div class="modal-header">
          <div class="modal-icon-name" id="modalName">—</div>
          <div class="modal-badges" id="modalBadges"></div>
        </div>

        <!-- Variants — hidden if no dark -->
        <div class="modal-section" id="modalVariantSection" style="display:none">
          <div class="modal-section-title">Variants</div>
          <div class="variant-grid">
            <div class="variant-card active" data-v="light" id="vCardLight">
              <div class="variant-card-bg dark-bg">
                <div class="variant-icon" id="vIconLight"></div>
              </div>
              <span class="variant-card-label">Light</span>
            </div>
            <div class="variant-card" data-v="dark" id="vCardDark">
              <div class="variant-card-bg light-bg">
                <div class="variant-icon" id="vIconDark"></div>
              </div>
              <span class="variant-card-label">Dark</span>
            </div>
          </div>
        </div>

        <!-- Export -->
        <div class="modal-section">
          <div class="modal-section-title">Export</div>
          <div class="export-list">
            <button class="exp-btn primary" id="expSVG">
              <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/>
              </svg>
              Download SVG <span class="exp-tag">SVG</span>
            </button>
            <button class="exp-btn" id="expPNG">
              <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/>
              </svg>
              Download PNG <span class="exp-tag">512px</span>
            </button>
            <button class="exp-btn" id="expJPG">
              <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/>
              </svg>
              Download JPG <span class="exp-tag">512px</span>
            </button>
            <button class="exp-btn" id="expCopySVG">
              <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M5 2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V5.5L10.5 2H5ZM4 1h6.5L14 4.5V12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3a2 2 0 0 1 1-1.732V1ZM1 4a1 1 0 0 1 1-1h1v1H2v9h6v-1h1v1a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4Z" fill="currentColor"/>
              </svg>
              Copy SVG Code <span class="exp-tag">CODE</span>
            </button>
          </div>
        </div>

      </div><!-- /modal-right -->
    </div>
  </div>

  <!-- Toast -->
  <div id="gal-toast">
    <span class="toast-icon">
      <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
        <path d="M11.467 3.727c.289.286.29.751.002 1.04L6.12 10.149a.75.75 0 0 1-1.076-.026L3.03 7.888a.75.75 0 1 1 1.093-1.028l1.49 1.588 4.85-4.723a.75.75 0 0 1 1.004.002Z" fill="currentColor"/>
      </svg>
    </span>
    <span id="gal-toast-msg">Done!</span>
  </div>

  <script src="js/icon-registry.js"></script>
  <script>
    const galGrid             = document.getElementById('galGrid');
    const galSearch           = document.getElementById('galSearch');
    const galCount            = document.getElementById('galCount');
    const galLabel            = document.getElementById('galLabel');
    const toast               = document.getElementById('gal-toast');
    const toastMsg            = document.getElementById('gal-toast-msg');
    const modal               = document.getElementById('iconModal');
    const modalClose          = document.getElementById('modalClose');
    const modalName           = document.getElementById('modalName');
    const modalBadges         = document.getElementById('modalBadges');
    const modalPreviewIcon    = document.getElementById('modalPreviewIcon');
    const modalVariantSection = document.getElementById('modalVariantSection');
    const vCardLight          = document.getElementById('vCardLight');
    const vCardDark           = document.getElementById('vCardDark');
    const vIconLight          = document.getElementById('vIconLight');
    const vIconDark           = document.getElementById('vIconDark');
    const expSVG              = document.getElementById('expSVG');
    const expPNG              = document.getElementById('expPNG');
    const expJPG              = document.getElementById('expJPG');
    const expCopySVG          = document.getElementById('expCopySVG');

    let allIcons = [], activeIcon = null, activeVariant = 'light', toastTimer;

    /* ── Helpers ── */
    function showToast(msg) {
      toastMsg.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function activeCode() {
      return activeVariant === 'dark' && activeIcon.hasDark
        ? activeIcon.darkCode : activeIcon.lightCode;
    }

    /**
     * Parse an SVG string and force width/height attributes so it
     * fills its container without distortion. Returns the SVG element.
     */
    function parseSVG(code) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(code, 'image/svg+xml');
      const svg = doc.documentElement;

      // Ensure viewBox exists — derive from width/height if missing
      if (!svg.getAttribute('viewBox')) {
        const w = svg.getAttribute('width') || '24';
        const h = svg.getAttribute('height') || '24';
        svg.setAttribute('viewBox', `0 0 ${parseFloat(w)} ${parseFloat(h)}`);
      }

      // Remove fixed width/height so CSS controls the size
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

      return svg;
    }

    function injectSVG(container, code) {
      container.innerHTML = '';
      container.appendChild(parseSVG(code));
    }

    /* ── Variant cards ── */
    [vCardLight, vCardDark].forEach(card => {
      card.addEventListener('click', () => {
        activeVariant = card.dataset.v;
        vCardLight.classList.toggle('active', activeVariant === 'light');
        vCardDark.classList.toggle('active',  activeVariant === 'dark');
        // Swap preview with transition
        modalPreviewIcon.classList.add('swapping');
        setTimeout(() => {
          injectSVG(modalPreviewIcon, activeCode());
          modalPreviewIcon.classList.remove('swapping');
        }, 130);
      });
    });

    /* ── Modal open / close ── */
    function openModal(icon) {
      activeIcon = icon;
      activeVariant = 'light';

      modalName.textContent = icon.name;
      modalBadges.innerHTML =
        `<span class="mbadge grey">SVG</span>` +
        (icon.hasDark
          ? `<span class="mbadge green"><svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>Light &amp; Dark</span>`
          : '');

      // Main preview
      injectSVG(modalPreviewIcon, icon.lightCode);

      // Variants
      if (icon.hasDark) {
        modalVariantSection.style.display = 'block';
        injectSVG(vIconLight, icon.lightCode);
        injectSVG(vIconDark,  icon.darkCode);
        vCardLight.classList.add('active');
        vCardDark.classList.remove('active');
      } else {
        modalVariantSection.style.display = 'none';
      }

      resetExportBtns();
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    modalClose.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === '/' && !modal.classList.contains('open') && document.activeElement !== galSearch) {
        e.preventDefault();
        galSearch.focus();
      }
    });

    /* ── Export buttons ── */
    function resetExportBtns() {
      expCopySVG.classList.remove('success');
      expCopySVG.innerHTML = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M5 2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V5.5L10.5 2H5ZM4 1h6.5L14 4.5V12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3a2 2 0 0 1 1-1.732V1ZM1 4a1 1 0 0 1 1-1h1v1H2v9h6v-1h1v1a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4Z" fill="currentColor"/></svg> Copy SVG Code <span class="exp-tag">CODE</span>`;
    }

    expSVG.addEventListener('click', async () => {
      try { await downloadAs(activeCode(), `${activeIcon.name}.svg`, 'svg'); showToast(`${activeIcon.name}.svg downloaded`); }
      catch { showToast('Download failed'); }
    });
    expPNG.addEventListener('click', async () => {
      expPNG.textContent = 'Generating…';
      try { await downloadAs(activeCode(), `${activeIcon.name}.png`, 'png'); showToast(`${activeIcon.name}.png downloaded`); }
      catch { showToast('PNG export failed'); }
      expPNG.innerHTML = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/></svg> Download PNG <span class="exp-tag">512px</span>`;
    });
    expJPG.addEventListener('click', async () => {
      expJPG.textContent = 'Generating…';
      try { await downloadAs(activeCode(), `${activeIcon.name}.jpg`, 'jpg'); showToast(`${activeIcon.name}.jpg downloaded`); }
      catch { showToast('JPG export failed'); }
      expJPG.innerHTML = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M7.5 1a.5.5 0 0 1 .5.5v8.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7 10.293V1.5a.5.5 0 0 1 .5-.5ZM2 13a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1h-10A.5.5 0 0 1 2 13Z" fill="currentColor"/></svg> Download JPG <span class="exp-tag">512px</span>`;
    });
    expCopySVG.addEventListener('click', async () => {
      try {
        await copyIconSVG(activeCode());
        expCopySVG.classList.add('success');
        expCopySVG.innerHTML = `<svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M11.467 3.727c.289.286.29.751.002 1.04L6.12 10.149a.75.75 0 0 1-1.076-.026L3.03 7.888a.75.75 0 1 1 1.093-1.028l1.49 1.588 4.85-4.723a.75.75 0 0 1 1.004.002Z" fill="currentColor"/></svg> Copied to clipboard <span class="exp-tag">✓</span>`;
        showToast('SVG code copied to clipboard');
        setTimeout(resetExportBtns, 2500);
      } catch { showToast('Copy failed — try again'); }
    });

    /* ── View toggle ── */
    function setView(v) {
      galGrid.className = 'gallery-grid' + (v === 'large' ? ' view-large' : v === 'list' ? ' view-list' : '');
      document.getElementById('viewCompact').classList.toggle('active', v === 'compact');
      document.getElementById('viewLarge').classList.toggle('active',   v === 'large');
      document.getElementById('viewList').classList.toggle('active',    v === 'list');
    }

    /* ── Grid rendering ── */
    function filtered() {
      const q = galSearch.value.trim().toLowerCase();
      return q ? allIcons.filter(i => i.name.toLowerCase().includes(q)) : allIcons;
    }

    function renderGrid(icons) {
      const q = galSearch.value.trim();
      galLabel.textContent = q ? `Search: "${q}"` : 'All Icons';

      if (!icons.length) {
        galGrid.innerHTML = `<div class="gallery-state">No results for "<em>${q}</em>"</div>`;
        galCount.innerHTML = `<strong>0</strong>&nbsp;icons`;
        return;
      }

      galCount.innerHTML = `<strong>${icons.length}</strong>&nbsp;icon${icons.length !== 1 ? 's' : ''}`;

      // Build tiles — inject SVG inline, no blob URLs
      galGrid.innerHTML = '';
      icons.forEach((icon, i) => {
        const tile = document.createElement('div');
        tile.className = 'gal-tile';
        tile.style.animationDelay = `${Math.min(i * 6, 300)}ms`;
        tile.dataset.name = icon.name;

        if (icon.hasDark) {
          const dot = document.createElement('span');
          dot.className = 'gal-dark-dot';
          dot.title = 'Has dark variant';
          tile.appendChild(dot);
        }

        const iconWrap = document.createElement('div');
        iconWrap.className = 'tile-icon';
        iconWrap.appendChild(parseSVG(icon.lightCode));
        tile.appendChild(iconWrap);

        const label = document.createElement('span');
        label.className = 'gal-tile-name';
        label.textContent = icon.name;
        tile.appendChild(label);

        galGrid.appendChild(tile);
      });
    }

    galGrid.addEventListener('click', e => {
      const tile = e.target.closest('.gal-tile');
      if (!tile) return;
      const icon = allIcons.find(i => i.name === tile.dataset.name);
      if (icon) openModal(icon);
    });

    galSearch.addEventListener('input', () => renderGrid(filtered()));

    /* ── Init ── */
    (async () => {
      try {
        allIcons = await loadIcons();
        renderGrid(allIcons);
      } catch (err) {
        galGrid.innerHTML = `<div class="gallery-state">
          Could not load icons.<br>
          Run <code>cd public/dev && python generate_icons.py</code> to generate <code>data/icons.json</code>.<br><br>
          <small style="opacity:0.5">${err.message}</small>
        </div>`;
        console.error(err);
      }
    })();
  </script>
