<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Bright Icons</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="js/config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --fg:#c9d1d9;
  --card:#161b22;
  --primary:#288e45;
  --secondary:#21262d;
  --muted:#30363d;
  --muted-fg:#6e7681;
  --border:#30363d;
  --font-mono:'JetBrains Mono',monospace;
  --font-body:'Inter',sans-serif;
  --grad-accent:linear-gradient(135deg,#288e45 0%,#2ea566 100%);
}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── Background grid ── */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(40,142,69,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(40,142,69,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridDrift 20s linear infinite;
  pointer-events:none;z-index:0;
}
@keyframes gridDrift{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}

.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(40,142,69,0.1) 0%,transparent 70%);top:-100px;left:-100px;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(46,165,102,0.07) 0%,transparent 70%);bottom:-80px;right:-80px;}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.5rem;
  background:rgba(13,17,23,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.logo{
  display:flex;align-items:center;gap:.6rem;
  font-family:var(--font-mono);font-size:.88rem;font-weight:600;
  color:var(--fg);text-decoration:none;
  transition:color .2s;
}
.logo:hover{color:var(--primary)}
.nav-links{display:flex;gap:.5rem;}
.nav-link{
  display:flex;align-items:center;gap:.35rem;
  padding:.35rem .8rem;border-radius:6px;
  font-family:var(--font-mono);font-size:.72rem;font-weight:500;
  color:var(--muted-fg);text-decoration:none;
  border:1px solid transparent;
  transition:all .2s;
}
.nav-link:hover{color:var(--fg);border-color:var(--border);background:var(--secondary)}
.nav-link.active{color:var(--primary);border-color:rgba(40,142,69,0.3);background:rgba(40,142,69,0.08)}

/* ── Page content ── */
.page{position:relative;z-index:1;flex:1;padding:2rem 1.5rem 4rem;}
.page-header{
  max-width:1400px;margin:0 auto 2.5rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
}
.page-title{
  font-family:var(--font-mono);font-size:1.4rem;font-weight:700;color:var(--fg);
}
.page-title span{color:var(--primary)}
.page-sub{
  font-size:.78rem;color:var(--muted-fg);margin-top:.25rem;
  font-family:var(--font-mono);
}
.icon-count-badge{
  font-family:var(--font-mono);font-size:.7rem;
  color:var(--primary);
  background:rgba(40,142,69,0.1);
  border:1px solid rgba(40,142,69,0.25);
  padding:.3rem .7rem;border-radius:20px;
  white-space:nowrap;
}

/* ── Gallery grid ── */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:1rem;
  max-width:1400px;
  margin:0 auto;
}

/* ── Icon card ── */
.icon-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  display:flex;flex-direction:column;
  align-items:center;
  padding:1.25rem .75rem .85rem;
  gap:.7rem;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  opacity:0;
  animation:cardIn .4s ease forwards;
}
.icon-card:hover{
  border-color:rgba(40,142,69,0.4);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(40,142,69,0.12);
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.icon-preview{
  width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;
  color:var(--fg);
  flex-shrink:0;
}
.icon-preview svg{
  width:40px;height:40px;
  overflow:visible;
}

.icon-name{
  font-family:var(--font-mono);
  font-size:.65rem;
  font-weight:500;
  color:var(--muted-fg);
  text-align:center;
  line-height:1.3;
  word-break:break-word;
  max-width:100%;
}

.card-actions{
  display:flex;flex-direction:column;
  gap:.35rem;
  width:100%;
}

.card-btn{
  display:flex;align-items:center;justify-content:center;gap:.3rem;
  padding:.35rem .5rem;
  border-radius:5px;
  font-family:var(--font-mono);font-size:.62rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border);
  background:var(--secondary);color:var(--muted-fg);
  transition:all .15s;
  width:100%;
  white-space:nowrap;
}
.card-btn:hover{
  background:var(--muted);color:var(--fg);
  border-color:rgba(40,142,69,0.3);
}
.card-btn.primary{
  background:rgba(40,142,69,0.12);
  border-color:rgba(40,142,69,0.3);
  color:var(--primary);
}
.card-btn.primary:hover{
  background:rgba(40,142,69,0.22);
  border-color:rgba(40,142,69,0.5);
}
.card-btn.success{
  background:rgba(40,142,69,0.2)!important;
  border-color:rgba(40,142,69,0.5)!important;
  color:#4ade80!important;
}

/* ── Empty state ── */
.empty-state{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5rem 2rem;gap:1rem;
  color:var(--muted-fg);
  font-family:var(--font-mono);font-size:.8rem;
  text-align:center;
}
.empty-state svg{opacity:.3;margin-bottom:.5rem}

/* ── Loading skeleton ── */
.skeleton-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  height:180px;
  animation:skeletonPulse 1.5s ease infinite;
}
@keyframes skeletonPulse{
  0%,100%{opacity:.5}
  50%{opacity:1}
}

/* ── Toast ── */
#toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--card);
  border:1px solid rgba(40,142,69,0.4);
  color:var(--fg);
  padding:.6rem 1.1rem;
  border-radius:8px;
  font-family:var(--font-mono);font-size:.72rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:opacity .2s,transform .2s;
  z-index:999;display:flex;align-items:center;gap:.5rem;
}
#toast.show{opacity:1;transform:translateY(0)}

@media(max-width:640px){
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem}
  .page{padding:1.25rem 1rem 3rem}
  .page-header{margin-bottom:1.5rem}
  .nav-link span{display:none}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Topbar -->
<nav class="topbar">
  <a class="logo" href="index.html">
    <svg viewBox="0 0 28 28" width="22" height="22" fill="none">
      <rect width="28" height="28" rx="7" fill="#288e45"/>
      <rect x="4"    y="4"    width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="11.5" y="4"    width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="19"   y="4"    width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="4"    y="11.5" width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="11.5" y="11.5" width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="19"   y="11.5" width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="4"    y="19"   width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="11.5" y="19"   width="5" height="5" rx="1.3" fill="#fff"/>
      <rect x="19"   y="19"   width="5" height="5" rx="1.3" fill="#fff"/>
    </svg>
    Bright Icons
  </a>
  <div class="nav-links">
    <a class="nav-link" href="editor.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
      <span>Editor</span>
    </a>
    <a class="nav-link active" href="gallery.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Gallery</span>
    </a>
  </div>
</nav>

<!-- Page -->
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Icon <span>Gallery</span></div>
      <div class="page-sub">Handcrafted icons, ready to download</div>
    </div>
    <div class="icon-count-badge" id="count-badge">Loading…</div>
  </div>
  <div class="gallery-grid" id="gallery-grid">
    <!-- skeletons while loading -->
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>
</div>

<div id="toast">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Copied!</span>
</div>

<script>
// ── Utility: clean SVG for safe rendering ──
function cleanSvg(svgStr, size) {
  if (!svgStr) return '';
  let s = svgStr.replace(/stroke-\s+/g, '');
  if (!s.includes('stroke-width')) s = s.replace(/<svg/, '<svg stroke-width="2"');
  s = s.replace(/<svg([^>]*)>/, (_, attrs) => {
    attrs = attrs.replace(/\s*width="[^"]*"/, '').replace(/\s*height="[^"]*"/, '');
    return `<svg${attrs} width="${size}" height="${size}" style="overflow:visible">`;
  });
  return s;
}

// ── Toast ──
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Download SVG ──
function downloadSvg(name, svgStr) {
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.toLowerCase().replace(/\s+/g, '-') + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Copy SVG ──
async function copySvg(btn, svgStr) {
  try {
    await navigator.clipboard.writeText(svgStr);
    btn.classList.add('success');
    btn.textContent = '✓ Copied!';
    showToast('SVG copied to clipboard');
    setTimeout(() => {
      btn.classList.remove('success');
      btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy SVG`;
    }, 2000);
  } catch {
    showToast('Copy failed — try a modern browser');
  }
}

// ── Render grid ──
function renderGallery(icons) {
  const grid  = document.getElementById('gallery-grid');
  const badge = document.getElementById('count-badge');
  badge.textContent = `${icons.length} icon${icons.length !== 1 ? 's' : ''}`;

  if (!icons.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      No icons yet.<br>Add some from the admin panel.
    </div>`;
    return;
  }

  grid.innerHTML = icons.map((icon, i) => {
    const preview = cleanSvg(icon.svg, 40);
    return `<div class="icon-card" style="animation-delay:${i * 40}ms">
      <div class="icon-preview">${preview}</div>
      <div class="icon-name">${icon.name}</div>
      <div class="card-actions">
        <button class="card-btn primary" onclick="downloadSvg(${JSON.stringify(icon.name)}, ${JSON.stringify(icon.svg)})">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          Download SVG
        </button>
        <button class="card-btn" onclick="copySvg(this, ${JSON.stringify(icon.svg)})">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy SVG
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── Load icons ──
async function loadIcons() {
  try {
    const res  = await fetch('data/gallery-icons.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderGallery(data);
  } catch (err) {
    document.getElementById('gallery-grid').innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Could not load icons.<br><span style="color:var(--muted-fg);font-size:.65rem">Make sure data/gallery-icons.json exists.</span>
    </div>`;
    document.getElementById('count-badge').textContent = 'Error';
  }
}

loadIcons();
</script>
</body>
</html>
